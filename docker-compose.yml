services:
  db-server:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: taskflow_db
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

  backend-api:
    build: ./Backend
    image: yusef14/backend:v1
    ports:
      - "3000:3000"
    depends_on:
      - db-server
    networks:
      - app-network

  frontend-ui:
    build: ./Frontend
    ports:
      - "80:80"
    depends_on:
      - backend-api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge