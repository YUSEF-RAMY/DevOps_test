apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: yusef14/backend:v1
        env:
        - name: DB_HOST
          value: "db-server" # ده اسم الـ Service بتاعة الـ MySQL
        - name: DB_USER
          value: "root"
        - name: DB_PASSWORD
          value: "secret"
        - name: DB_NAME
          value: "taskflow_db"
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000